name: Update

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force update?"
        type: boolean
        default: false
      full:
        description: "Full generation (download full depot, regenerate all assets)?"
        type: boolean
        default: false
      skip_upload:
        description: "Skip CDN upload?"
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: justinthelaw/maximize-github-runner-space@v0.10.0
        with:
          cleanup-profile: max
          skip-components: gh-cli

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('scripts/item-generator/ItemGenerator.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Update
        run: npm run update
        env:
          INPUT_FORCE: ${{ inputs.force }}
          INPUT_FULL: ${{ inputs.full }}
          INPUT_SKIP_UPLOAD: ${{ inputs.skip_upload }}
          STORAGE_ZONE: ${{ secrets.STORAGE_ZONE }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected; depot already up to date." >> $GITHUB_STEP_SUMMARY
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Extract CS2 version
        id: version
        if: steps.changes.outputs.changed == 'true'
        run: |
          STEAM_INF="scripts/workdir/game/csgo/steam.inf"
          if [ ! -f "$STEAM_INF" ]; then
            echo "::error::${STEAM_INF} not found; expected it in the downloaded depot."
            exit 1
          fi
          CS2_VERSION="$(awk -F'=' '/^ClientVersion/ {print $2}' "$STEAM_INF" | tr -d '\r')"
          if [ -z "$CS2_VERSION" ]; then
            echo "::error::ClientVersion missing from ${STEAM_INF}."
            exit 1
          fi
          echo "number=${CS2_VERSION}" >> $GITHUB_OUTPUT
          echo "branch=cs2-v${CS2_VERSION}" >> $GITHUB_OUTPUT

      - name: Check if branch already exists
        id: check_branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          if git ls-remote --heads origin "${{ steps.version.outputs.branch }}" | grep -q .; then
            echo "Branch ${{ steps.version.outputs.branch }} already exists, skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true' && steps.check_branch.outputs.exists != 'true'
        id: commit_main
        run: |
          MANIFEST_ID="$(cat scripts/cs2.manifest)"
          git checkout -b "${{ steps.version.outputs.branch }}"
          git add .
          git commit -m "Update items (CS2 v${{ steps.version.outputs.number }})"
          git push origin "${{ steps.version.outputs.branch }}"

          echo "manifest=${MANIFEST_ID}" >> $GITHUB_OUTPUT
          echo "Committed changes to branch ${{ steps.version.outputs.branch }}" >> $GITHUB_STEP_SUMMARY

      - name: Create pull request for main repository
        if: steps.changes.outputs.changed == 'true' && steps.check_branch.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.LIB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.version.outputs.branch }}" \
            --title "Update items (CS2 v${{ steps.version.outputs.number }})" \
            --body "Manifest: ${{ steps.commit_main.outputs.manifest }}"

      - name: Clean up work directories
        if: always()
        run: rm -rf scripts/workdir/decompiled scripts/workdir/game

      - name: Checkout assets repository
        if: steps.changes.outputs.changed == 'true' && steps.check_branch.outputs.exists != 'true'
        uses: actions/checkout@v6
        with:
          repository: ianlucas/cs2-lib-assets
          path: cs2-lib-assets
          token: ${{ secrets.ASSETS_TOKEN }}

      - name: Sync assets to repository
        if: steps.changes.outputs.changed == 'true' && steps.check_branch.outputs.exists != 'true'
        run: rsync -av scripts/workdir/output/ cs2-lib-assets/

      - name: Commit and push asset changes
        if: steps.changes.outputs.changed == 'true' && steps.check_branch.outputs.exists != 'true'
        id: commit_assets
        working-directory: ./cs2-lib-assets
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No asset changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git checkout -b "${{ steps.version.outputs.branch }}"
          git add .
          git commit -m "Update assets (CS2 v${{ steps.version.outputs.number }})"
          git push origin "${{ steps.version.outputs.branch }}"

          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Committed asset changes to branch ${{ steps.version.outputs.branch }}" >> $GITHUB_STEP_SUMMARY

      - name: Create pull request for assets repository
        if: steps.changes.outputs.changed == 'true' && steps.check_branch.outputs.exists != 'true' && steps.commit_assets.outputs.has_changes == 'true'
        working-directory: ./cs2-lib-assets
        env:
          GH_TOKEN: ${{ secrets.ASSETS_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.version.outputs.branch }}" \
            --title "Update assets (CS2 v${{ steps.version.outputs.number }})" \
            --body "Automated asset update for CS2 v${{ steps.version.outputs.number }}"
