name: Update

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force update?"
        type: boolean
        default: false
      full:
        description: "Full generation (download full depot, regenerate all assets)?"
        type: boolean
        default: false
      skip_upload:
        description: "Skip CDN upload?"
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: justinthelaw/maximize-github-runner-space@v0.10.0
        with:
          cleanup-profile: max
          skip-components: gh-cli

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('scripts/item-generator/ItemGenerator.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Update
        run: npm run update
        env:
          INPUT_FORCE: ${{ inputs.force }}
          INPUT_FULL: ${{ inputs.full }}
          INPUT_SKIP_UPLOAD: ${{ inputs.skip_upload }}
          STORAGE_ZONE: ${{ secrets.STORAGE_ZONE }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}

      - name: Detect changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected; depot already up to date." >> $GITHUB_STEP_SUMMARY
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Extract CS2 version
        id: version
        if: steps.changes.outputs.changed == 'true'
        run: |
          STEAM_INF="scripts/workdir/game/csgo/steam.inf"
          if [ ! -f "$STEAM_INF" ]; then
            echo "::error::${STEAM_INF} not found; expected it in the downloaded depot."
            exit 1
          fi
          CS2_VERSION="$(awk -F'=' '/^ClientVersion/ {print $2}' "$STEAM_INF" | tr -d '\r')"
          if [ -z "$CS2_VERSION" ]; then
            echo "::error::ClientVersion missing from ${STEAM_INF}."
            exit 1
          fi
          echo "number=${CS2_VERSION}" >> $GITHUB_OUTPUT
          echo "branch=cs2-v${CS2_VERSION}" >> $GITHUB_OUTPUT

      - name: Check if branch already exists
        id: check_branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          if git ls-remote --heads origin "${{ steps.version.outputs.branch }}" | grep -q .; then
            echo "Branch ${{ steps.version.outputs.branch }} already exists, skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true' && steps.check_branch.outputs.exists != 'true'
        id: commit_main
        run: |
          MANIFEST_ID="$(cat scripts/cs2.manifest)"
          git checkout -b "${{ steps.version.outputs.branch }}"
          git add .
          git commit -m "Update items (CS2 v${{ steps.version.outputs.number }})"
          git push origin "${{ steps.version.outputs.branch }}"

          echo "manifest=${MANIFEST_ID}" >> $GITHUB_OUTPUT
          echo "Committed changes to branch ${{ steps.version.outputs.branch }}" >> $GITHUB_STEP_SUMMARY

      - name: Create pull request for main repository
        if: steps.changes.outputs.changed == 'true' && steps.check_branch.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.LIB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.version.outputs.branch }}" \
            --title "Update items (CS2 v${{ steps.version.outputs.number }})" \
            --body "Manifest: ${{ steps.commit_main.outputs.manifest }}"

      - name: Clean up work directories
        if: always()
        run: rm -rf scripts/workdir/decompiled scripts/workdir/game

      - name: Package assets
        if: steps.changes.outputs.changed == 'true' && steps.check_branch.outputs.exists != 'true'
        run: |
          mkdir -p assets-release
          # Release assets are capped at 2 GiB each, so stream the output tree into
          # ~1.9 GiB parts. Reassemble with: cat cs2-assets-v<version>.tar.part* | tar -xf -
          tar -cf - -C scripts/workdir/output . \
            | split -b 1900M -d -a 3 - "assets-release/cs2-assets-v${{ steps.version.outputs.number }}.tar.part"
          ls -lh assets-release

      - name: Publish assets release
        if: steps.changes.outputs.changed == 'true' && steps.check_branch.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.ASSETS_TOKEN }}
          VERSION: ${{ steps.version.outputs.number }}
        run: |
          TAG="cs2-v${VERSION}"
          printf '%s\n' \
            "Generated assets for CS2 v${VERSION}." \
            "" \
            "Download every .tar.part* file, then reassemble and extract:" \
            '```' \
            "cat cs2-assets-v${VERSION}.tar.part* | tar -xf -" \
            '```' > release-notes.md
          # Idempotent for re-runs: drop any prior release + tag for this version first.
          gh release delete "$TAG" --repo ianlucas/cs2-lib-assets --cleanup-tag --yes 2>/dev/null || true
          gh release create "$TAG" \
            --repo ianlucas/cs2-lib-assets \
            --title "CS2 v${VERSION}" \
            --notes-file release-notes.md \
            --latest \
            assets-release/*
          echo "Published assets release ${TAG} to ianlucas/cs2-lib-assets" >> "$GITHUB_STEP_SUMMARY"
